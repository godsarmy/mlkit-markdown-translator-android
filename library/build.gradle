plugins {
    id 'com.android.library'
    id 'maven-publish'
}

def mlkitTranslateVersion = project.findProperty('mlkitTranslateVersion') ?: '17.0.3'
def flexmarkVersion = project.findProperty('flexmarkVersion') ?: '0.64.8'

android {
    namespace 'io.github.godsarmy.mlmarkdown'
    compileSdk 34

    defaultConfig {
        minSdk 24
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        consumerProguardFiles 'consumer-rules.pro'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.github.godsarmy'
                artifactId = 'mlkit-markdown-translator-android'
            }
        }
    }
}

dependencies {
    implementation 'androidx.annotation:annotation:1.8.2'
    implementation "com.vladsch.flexmark:flexmark:${flexmarkVersion}"
    implementation "com.vladsch.flexmark:flexmark-ext-tables:${flexmarkVersion}"
    implementation "com.google.mlkit:translate:${mlkitTranslateVersion}"

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}
