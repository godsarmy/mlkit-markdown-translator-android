name: Performance Regression

on:
  push:
  workflow_dispatch:
    inputs:
      profile:
        description: "Perf profile"
        required: false
        default: "ci"
        type: choice
        options:
          - ci
          - local-heavy
  schedule:
    - cron: '30 2 * * *'

jobs:
  markdown-perf-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Run markdown performance regression test
        shell: bash
        run: |
          PROFILE="${{ github.event.inputs.profile }}"
          if [[ -z "$PROFILE" || "$PROFILE" == "ci" ]]; then
            ./gradlew :library:testDebugUnitTest --tests "*MarkdownPerformanceRegressionTest"
          else
            ./gradlew :library:testDebugUnitTest --tests "*MarkdownPerformanceRegressionTest" \
              -Dmlmd.perf.warmupIterations=2 \
              -Dmlmd.perf.measuredIterations=8 \
              -Dmlmd.perf.hugeRepeat=220 \
              -Dmlmd.perf.chunkLength=350 \
              -Dmlmd.perf.thresholdMultiplier=1.3 \
              -Dmlmd.perf.verbose=true
          fi
